# Schema Registry — Architecture.md v1.2 §5
#
# 스키마 불일치 시 → silver_quarantine.parquet 격리 (crash 아님)
# on_mismatch: "quarantine" | "crash" | "warn"

version: "1.2"

schemas:
  dataset_a:
    description: "Server-i 검출 이벤트 원본 (Dataset A)"
    required_columns:
      - name: "server_name"
        dtype: "string"
      - name: "agent_ip"
        dtype: "string"
      - name: "file_path"
        dtype: "string"
      - name: "full_context_raw"        # 기존: detected_text_with_context
        dtype: "string"
        aliases:
          - "detected_text_with_context"  # 실제 데이터 컬럼명 fallback
          - "dfile_inspectcontentwithcontext"
      - name: "event_time"
        dtype: "datetime"
        aliases:
          - "dfile_createdate"
      - name: "패턴 종류"
        dtype: "string"
        aliases:
          - "pattern_type"
          - "dfile_patternname"
    pk_columns:
      - "server_name"
      - "agent_ip"
      - "file_path"
    fallback_pk:
      - "detection_id"
    on_mismatch: "quarantine"           # 불일치 행 → silver_quarantine.parquet

  dataset_b:
    description: "소만사 오탐 레이블링 데이터 (Dataset B)"
    required_columns:
      - name: "file_path"
        dtype: "string"
        aliases:
          - "파일 명"
      - name: "label"
        dtype: "string"
        aliases:
          - "판단근거"
      - name: "패턴 종류"
        dtype: "string"
      - name: "full_context_raw"        # 기존: detected_text_with_context
        dtype: "string"
        aliases:
          - "검출 내역"
          - "detected_text_with_context"
    pk_columns:
      - "server_name"
      - "agent_ip"
      - "file_path"
    fallback_pk:
      - "detection_id"
    on_mismatch: "quarantine"

