# 3-Layer RULE Labeler Configuration (Architecture.md v1.2 §7)
# 기존: 3-Layer Filter Configuration
#
# 회의록 2026-01 반영
# Layer 1: Keyword 기반 라벨러 (명확한 오탐 즉시 분류)
# Layer 2: Rule 기반 라벨러 (정규식/비즈니스 로직)
# Layer 3: ML 모델 (잔여 케이스 분류)
#
# ⚠️ 라벨러(Labeler) vs 필터(Filter):
#   - 라벨러는 행을 제거하지 않고 모든 결과를 유지합니다
#   - prediction_evidence 필드에 판정 근거를 기록합니다

# === Layer 1: Keyword Labeler ===      (기존: keyword_filter)
keyword_labeler:
  enabled: true

  # 내부 도메인 리스트 → FP-내부도메인
  # 회의록 2026-01 반영: 실제 오탐 사례 기반 도메인 추가
  internal_domains:
    - "@lguplus.co.kr"
    - "@bdp.lguplus.co.kr"
    - "@lge.lgt.co.kr"
    - "@Ige.lgt.co.kr"      # 회의록 확인: 실제 검출 사례
    - "@lgt.co.kr"          # 상위 도메인
    - "@lgcns.com"
    - "@lgelectronics.com"
    - "@map.lguplus.co.kr"  # 회의록 확인: irapptest3.map.lguplus.co.kr
    - "@LGUPLUS.CO.KR"      # 대문자 변형
    - "@BDP.LGUPLUS.CO.KR"
    - "@BPSS61.LGUPLUS.CO.KR"  # Kerberos 토큰
    - "@BDP1.LGUPLUS.CO.KR"    # 회의록 확인: Kerberos 토큰 변형

  # OS/오픈소스 저작권 도메인 → FP-OS저작권
  os_copyright_domains:
    - "@redhat.com"
    - "@fedora-project"
    - "@fedoraproject.org"
    - "@apache.org"
    - "@gnu.org"
    - "@fsf.org"
    - "@kernel.org"
    - "@ubuntu.com"
    - "@debian.org"
    - "@centos.org"
    - "@paloaltonetworks.com"  # 네트워크 장비 벤더
    - "@cisco.com"
    - "@oracle.com"
    - "@microsoft.com"
    - "@sun.com"
    - "@ibm.com"

  # 명확한 더미 도메인 → FP-더미데이터
  # 회의록 2026-01 반영: 실제 오탐 사례 기반 도메인 추가
  dummy_domains:
    - "@example.com"
    - "@example.org"
    - "@test.com"
    - "@test.org"
    - "@localhost"
    - "@127.0.0.1"
    - "@entry.sc"         # 회의록 확인: 개발 더미 이메일
    - "@cherry.email"     # 회의록 확인: 개발 더미 이메일
    - "@dummy.com"
    - "@fake.com"
    - "@sample.com"
    - "@demo.com"

  # 대소문자 무시 여부
  case_insensitive: true

  # 규칙별 분류 메타데이터 (prediction_evidence용)
  rules:
    - name: "internal_domain"
      label: "FP-내부도메인"
      reason_code: "INTERNAL_DOMAIN"
      evidence_key: "matched_domain"
    - name: "os_copyright"
      label: "FP-OS저작권"
      reason_code: "OS_COPYRIGHT_DOMAIN"
      evidence_key: "matched_domain"
    - name: "dummy_domain"
      label: "FP-더미데이터"
      reason_code: "DUMMY_DOMAIN"
      evidence_key: "matched_domain"

# === Layer 2: Rule Labeler ===          (기존: rule_filter)
rule_labeler:
  enabled: true

  # Timestamp 패턴 → FP-타임스탬프
  timestamp_patterns:
    # Unix timestamp (10자리: 초, 13자리: 밀리초)
    - pattern: "\\b\\d{10}\\b"
      description: "Unix timestamp (seconds)"
      reason_code: "EPOCH_TIMESTAMP"
      evidence_key: "matched_pattern"
    - pattern: "\\b\\d{13}\\b"
      description: "Unix timestamp (milliseconds)"
      reason_code: "EPOCH_TIMESTAMP_MS"
      evidence_key: "matched_pattern"
    # 날짜 형식
    - pattern: "\\d{4}[-/]\\d{2}[-/]\\d{2}"
      description: "Date format YYYY-MM-DD"
      reason_code: "DATE_FORMAT"
      evidence_key: "matched_pattern"
    - pattern: "\\d{2}[-/]\\d{2}[-/]\\d{4}"
      description: "Date format DD-MM-YYYY"
      reason_code: "DATE_FORMAT"
      evidence_key: "matched_pattern"
    # 특정 키워드와 함께 나오는 숫자
    - pattern: "(?:timestamp|time|date|datetime)\\s*[:=]\\s*\\d+"
      description: "timestamp/date keyword with number"
      reason_code: "TIMESTAMP_KEYWORD"
      evidence_key: "matched_pattern"
    - pattern: "xpiryDate=\\d+"
      description: "Kerberos expiry date"
      reason_code: "KERBEROS_EXPIRY"
      evidence_key: "matched_pattern"
    - pattern: "duration:\\s*\\d+"
      description: "Duration value"
      reason_code: "DURATION_VALUE"
      evidence_key: "matched_pattern"

  # Bytes 크기 패턴 → FP-bytes크기
  bytes_patterns:
    - pattern: "\\d+\\s*bytes?"
      description: "N bytes pattern"
      reason_code: "FILE_SIZE_BYTES"
      evidence_key: "matched_pattern"
    - pattern: "\\d+\\s*[KMGT]B"
      description: "File size with unit"
      reason_code: "FILE_SIZE_UNIT"
      evidence_key: "matched_pattern"
    - pattern: "size\\s*[:=]\\s*\\d+"
      description: "size keyword with number"
      reason_code: "SIZE_KEYWORD"
      evidence_key: "matched_pattern"

  # 버전번호/코드 패턴 → FP-숫자나열/코드
  # 회의록 2026-01 반영: 실제 오탐 사례 기반 패턴 추가
  version_patterns:
    - pattern: "\\d+\\.\\d+\\.\\d+[-.]?\\d*"
      description: "Version number (1.2.3.4)"
      reason_code: "VERSION_NUMBER"
      evidence_key: "matched_pattern"
    - pattern: "v\\d+\\.\\d+"
      description: "Version with v prefix"
      reason_code: "VERSION_PREFIX"
      evidence_key: "matched_pattern"
    - pattern: "JGNORE\\s*=\\s*\\d+"
      description: "JGNORE code value"
      reason_code: "JGNORE_CODE"
      evidence_key: "matched_pattern"
    - pattern: "[A-Z]+_VER\\s*=\\s*[A-Z]?\\d+"
      description: "Firmware/software version (MWARE_VER=Z21023)"
      reason_code: "FIRMWARE_VERSION"
      evidence_key: "matched_pattern"
    - pattern: "\\d+-\\d+-\\d{4,}"
      description: "Version with dashes (1.3.3.32-2087-1512)"
      reason_code: "VERSION_DASHES"
      evidence_key: "matched_pattern"
    - pattern: "</changelo"
      description: "Changelog XML tag (version info context)"
      reason_code: "CHANGELOG_TAG"
      evidence_key: "matched_pattern"

  # 파일 경로 기반 규칙
  path_rules:
    # Docker 환경 → 오탐 가능성 높음
    - pattern: "/docker/overlay/"
      label: "FP-패턴맥락"
      description: "Docker overlay filesystem"
      reason_code: "DOCKER_PATH"
      evidence_key: "matched_path_pattern"
    # Hadoop 로그 → 오탐 가능성 높음
    - pattern: "hadoop-cmf-hdfs"
      label: "FP-패턴맥락"
      description: "Hadoop HDFS logs"
      reason_code: "HADOOP_LOG"
      evidence_key: "matched_path_pattern"
    # 테스트 경로
    - pattern: "/test/|/tests/|/testing/"
      label: "FP-더미데이터"
      description: "Test directory"
      reason_code: "TEST_DIRECTORY"
      evidence_key: "matched_path_pattern"

  # 대소문자 무시 여부
  case_insensitive: true

# === Layer 3: ML Model ===
ml_model:
  enabled: true
  # Layer 1, 2에서 분류되지 않은 샘플만 ML 모델로 전달
  # 모델 설정은 model_config.yaml 참조

# === Labeler 적용 순서 ===           (기존: filter_order)
labeler_order:
  - keyword_labeler   # Layer 1   (기존: keyword_filter)
  - rule_labeler      # Layer 2   (기존: rule_filter)
  - ml_model          # Layer 3

# === 결과 보존 설정 (Architecture §7) ===
# 라벨러는 필터와 달리 행을 제거하지 않고 모든 결과를 유지합니다
output:
  save_labeling_results: true     # 모든 결과 행 유지
  include_evidence: true          # prediction_evidence 컬럼 생성

# === 통계 및 로깅 ===
logging:
  # 각 Layer별 분류 건수 출력
  show_layer_stats: true
  # 분류된 샘플 저장 (디버깅용)
  save_filtered_samples: false
  output_dir: outputs/filter_results/

# === 하위 호환 별칭 (legacy FilterPipeline 지원) ===
# FilterPipeline.py는 keyword_filter / rule_filter 키를 사용합니다.
# 새 키(keyword_labeler / rule_labeler)와 병행 지원.
keyword_filter:
  enabled: true
  internal_domains:
    - "@lguplus.co.kr"
    - "@bdp.lguplus.co.kr"
    - "@lge.lgt.co.kr"
    - "@Ige.lgt.co.kr"
    - "@lgt.co.kr"
    - "@lgcns.com"
    - "@lgelectronics.com"
    - "@map.lguplus.co.kr"
    - "@LGUPLUS.CO.KR"
    - "@BDP.LGUPLUS.CO.KR"
    - "@BPSS61.LGUPLUS.CO.KR"
    - "@BDP1.LGUPLUS.CO.KR"
  os_copyright_domains:
    - "@redhat.com"
    - "@fedoraproject.org"
    - "@apache.org"
    - "@gnu.org"
    - "@kernel.org"
    - "@ubuntu.com"
    - "@debian.org"
    - "@microsoft.com"
    - "@oracle.com"
    - "@cisco.com"
  dummy_domains:
    - "@example.com"
    - "@example.org"
    - "@test.com"
    - "@localhost"
    - "@dummy.com"
    - "@fake.com"
    - "@sample.com"
  case_insensitive: true

rule_filter:
  enabled: true
  case_insensitive: true
  timestamp_patterns: []
  bytes_patterns: []
  version_patterns: []
  path_rules: []
