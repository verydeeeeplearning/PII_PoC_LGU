    aliases:
      - "외국인 등록 번호 개수"

  drivers_license_count:
    primary: "운전면허번호개수"
    aliases:
      - "운전 면허 번호 개수"

  passport_count:
    primary: "여권번호개수"
    aliases:
      - "여권 번호 개수"
      - "신규 여권 번호 개수"

  account_count:
